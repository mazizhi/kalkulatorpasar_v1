<script>
// ===== INLINE MANIFEST =====
(function(){
  // Ikon: kalkulator dengan tombol angka, latar hijau gelap
  const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
    <rect width="192" height="192" rx="28" fill="#1a7a3a"/>

    <rect x="36" y="24" width="120" height="144" rx="14" fill="#0d1f14"/>
    <rect x="36" y="24" width="120" height="144" rx="14" fill="none" stroke="#2ecc71" stroke-width="3"/>
    <!-- layar -->
    <rect x="48" y="36" width="96" height="32" rx="6" fill="#1a2535"/>
    <text x="136" y="60" text-anchor="end" font-size="22" font-family="monospace" font-weight="bold" fill="#ffdd00">0</text>
    <!-- tombol baris 1: 7 8 9 -->
    <rect x="48" y="80" width="26" height="20" rx="5" fill="#2a3a4e"/>
    <text x="61" y="94" text-anchor="middle" font-size="13" font-family="sans-serif" font-weight="bold" fill="#fff">7</text>
    <rect x="83" y="80" width="26" height="20" rx="5" fill="#2a3a4e"/>
    <text x="96" y="94" text-anchor="middle" font-size="13" font-family="sans-serif" font-weight="bold" fill="#fff">8</text>
    <rect x="118" y="80" width="26" height="20" rx="5" fill="#2a3a4e"/>
    <text x="131" y="94" text-anchor="middle" font-size="13" font-family="sans-serif" font-weight="bold" fill="#fff">9</text>
    <!-- tombol baris 2: 4 5 6 -->
    <rect x="48" y="106" width="26" height="20" rx="5" fill="#2a3a4e"/>
    <text x="61" y="120" text-anchor="middle" font-size="13" font-family="sans-serif" font-weight="bold" fill="#fff">4</text>
    <rect x="83" y="106" width="26" height="20" rx="5" fill="#2a3a4e"/>
    <text x="96" y="120" text-anchor="middle" font-size="13" font-family="sans-serif" font-weight="bold" fill="#fff">5</text>
    <rect x="118" y="106" width="26" height="20" rx="5" fill="#2a3a4e"/>
    <text x="131" y="120" text-anchor="middle" font-size="13" font-family="sans-serif" font-weight="bold" fill="#fff">6</text>
    <!-- tombol baris 3: 1 2 3 -->
    <rect x="48" y="132" width="26" height="20" rx="5" fill="#2a3a4e"/>
    <text x="61" y="146" text-anchor="middle" font-size="13" font-family="sans-serif" font-weight="bold" fill="#fff">1</text>
    <rect x="83" y="132" width="26" height="20" rx="5" fill="#2a3a4e"/>
    <text x="96" y="146" text-anchor="middle" font-size="13" font-family="sans-serif" font-weight="bold" fill="#fff">2</text>
    <rect x="118" y="132" width="26" height="20" rx="5" fill="#2a3a4e"/>
    <text x="131" y="146" text-anchor="middle" font-size="13" font-family="sans-serif" font-weight="bold" fill="#fff">3</text>
    <!-- tombol OK hijau besar -->
    <rect x="48" y="158" width="96" height="20" rx="5" fill="#2ecc71"/>
    <text x="96" y="172" text-anchor="middle" font-size="13" font-family="sans-serif" font-weight="bold" fill="#fff">OK</text>
  </svg>`;

  const encoded = 'data:image/svg+xml,' + encodeURIComponent(iconSvg);
  const manifest = {
    name: "Kalkulator Pasar",
    short_name: "Kalkulator Pasar",
    description: "Kalkulator dengan catatan dan riwayat transaksi",
    start_url: location.href,
    scope: location.href,
    display: "standalone",
    orientation: "portrait",
    background_color: "#1a7a3a",
    theme_color: "#1a2535",
    icons: [
      { src: encoded, sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
      { src: encoded, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = url;
  document.head.appendChild(link);

  // Apple touch icon
  const iconLink = document.createElement('link');
  iconLink.rel = 'apple-touch-icon';
  iconLink.href = encoded;
  document.head.appendChild(iconLink);
})();

// ===== SERVICE WORKER INLINE =====
if('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'calcnote-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(clients.claim());
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).catch(() => new Response('offline')))
      );
    });
  `;
  const swBlob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl, {scope: './'}).catch(()=>{});
}

// ===== PROMPT INSTALL PWA =====
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Tampilkan tombol install jika belum standalone
  setTimeout(() => {
    const btn = document.getElementById('installBtn');
    if(btn) btn.style.display = 'flex';
  }, 500);
});
window.addEventListener('appinstalled', () => {
  const btn = document.getElementById('installBtn');
  if(btn) btn.style.display = 'none';
  deferredPrompt = null;
});
function doInstall() {
  if(deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
  }
}
// Sembunyikan tombol install kalau sudah standalone
if(window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
  window.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('installBtn');
    if(btn) btn.style.display = 'none';
  });
}
</script>

<script>
const XAC=window.AudioContext||window.webkitAudioContext;
let xac=null;
function beep(t){
  try{
    if(!xac)xac=new XAC();
    const o=xac.createOscillator(),g=xac.createGain();
    o.connect(g);g.connect(xac.destination);
    if(t==='s'){o.frequency.value=880;g.gain.setValueAtTime(0.15,xac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,xac.currentTime+0.2);}
    else if(t==='d'){o.frequency.value=200;g.gain.setValueAtTime(0.1,xac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,xac.currentTime+0.1);}
    else{o.frequency.value=660;g.gain.setValueAtTime(0.06,xac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,xac.currentTime+0.05);}
    o.start();o.stop(xac.currentTime+0.2);
  }catch(e){}
}

let ls=[{e:'',n:''}],ai=0,caps=false,mode='e',bs='',bm=false;
let sd=(()=>{try{const r=localStorage.getItem('calcnote_sd');if(!r)return[];return JSON.parse(r).map(s=>({...s,rd:new Date(s.rd)}));}catch(e){return[];}})();

function saveSd(){try{localStorage.setItem('calcnote_sd',JSON.stringify(sd));}catch(e){}}
function fN(n){if(n===null||n===undefined||isNaN(n)||!isFinite(n))return'0';const s=n%1===0?n.toFixed(0):n.toFixed(4).replace(/\.?0+$/,'');return s.replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
function pN(s){return parseFloat(String(s).replace(/\./g,'').replace(',','.'))||0;}
function evE(x){
  if(!x||!x.trim())return null;
  try{let e=x.replace(/×/g,'*').replace(/÷/g,'/').replace(/,/g,'.').trim();if(/[^0-9\+\-\*\/\.\(\)\s]/.test(e))return null;const r=Function('"use strict";return ('+e+')')();if(typeof r==='number'&&isFinite(r))return r;}
  catch(x){}return null;
}
function eh(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function cT(){let t=0;ls.forEach(l=>{const r=evE(l.e);if(r!==null)t+=r;});return t;}
function nS(){return new Date().toLocaleString('id-ID');}
function tD0(d){const x=new Date(d);x.setHours(0,0,0,0);return x;}
function startB(){bm=true;bs='';document.getElementById('BW').classList.add('ed');rF();}
function stopB(){bm=false;document.getElementById('BW').classList.remove('ed');rF();}
function rF(){
  const tot=cT();const bv=bs?pN(bs):0;
  document.getElementById('BD').innerHTML=bm?(eh(bs||'0')+'<span class="cur cb"></span>'):fN(bv);
  const k=bv-tot;const ke=document.getElementById('FK');
  ke.textContent=fN(k);ke.className='fv'+(k<0?' ng':'');
  document.getElementById('FT').textContent=fN(tot);
  document.getElementById('HT').textContent=fN(tot);
}
function rN(){
  const nb=document.getElementById('NB');nb.innerHTML='';
  ls.forEach((l,i)=>{
    const res=evE(l.e);
    const d=document.createElement('div');d.className='ln'+(i===ai?' AL':'');
    const n=document.createElement('span');n.className='nn';n.textContent=i+1;d.appendChild(n);
    const ex=document.createElement('span');ex.className='ee';
    ex.innerHTML=(!bm&&i===ai&&mode==='e')?eh(l.e)+'<span class="cur"></span>':eh(l.e||'');
    d.appendChild(ex);
    if(l.n||(!bm&&i===ai&&mode==='n')){const nt=document.createElement('span');nt.className='tt';nt.innerHTML=(!bm&&i===ai&&mode==='n')?eh(l.n)+'<span class="cur"></span>':eh(l.n);d.appendChild(nt);}
    if(res!==null){const rv=document.createElement('span');rv.className='rr';rv.textContent=fN(res);d.appendChild(rv);}
    d.addEventListener('click',()=>{if(bm)stopB();ai=i;mode='e';rN();});
    nb.appendChild(d);
  });
  const al=nb.querySelector('.AL');
  if(al)al.scrollIntoView({block:'nearest',behavior:'smooth'});
  rF();
}
function resetK(){ls=[{e:'',n:''}];ai=0;mode='e';bs='';bm=false;document.getElementById('BW').classList.remove('ed');}
function eL(){while(ai>=ls.length)ls.push({e:'',n:''});}

document.querySelectorAll('.k').forEach(k=>{
  k.addEventListener('click',()=>{
    const v=k.dataset.v;
    beep(v==='SAVE'?'s':v==='DEL'||v==='RESET'?'d':'k');
    if(bm){
      if(v==='ENTER'||v==='SAVE'){if(v==='SAVE'){stopB();doSave();return;}stopB();return;}
      if(v==='RESET'){bs='';rF();return;}
      if(v==='DEL'){bs=bs.slice(0,-1);rF();return;}
      if(['×','÷','+','-'].includes(v))return;
      bs+=v;rF();return;
    }
    eL();const l=ls[ai];
    if(v==='ENTER'){if(ai===ls.length-1)ls.push({e:'',n:''});ai++;eL();mode='e';}
    else if(v==='DEL'){if(l.e.length>0){l.e=l.e.slice(0,-1);}else if(ls.length>1){ls.splice(ai,1);if(ai>=ls.length)ai=ls.length-1;}}
    else if(v==='RESET'){resetK();}
    else if(v==='SAVE'){doSave();return;}
    else{l.e+=v;}
    rN();
  });
});

function doSave(){
  const tot=cT();const snap=ls.filter(l=>l.e.trim()).map(l=>({e:l.e,n:l.n,r:evE(l.e)}));
  if(snap.length>0){const bv=bs?pN(bs):0;sd.unshift({id:Date.now(),date:nS(),rd:new Date(),ls:snap,tot,bay:bv,kem:bv-tot});saveSd();}
  resetK();rN();
}

document.querySelectorAll('.ak').forEach(k=>{
  k.addEventListener('click',()=>{
    const c=k.dataset.c;beep('k');eL();const l=ls[ai];
    if(c==='CAPS'){caps=!caps;document.querySelectorAll('.ak').forEach(a=>{if(a.dataset.c&&a.dataset.c.length===1)a.textContent=caps?a.dataset.c.toUpperCase():a.dataset.c.toLowerCase();});document.getElementById('CP').style.color=caps?'#4285f4':'#555';}
    else if(c==='BKSP'){if(mode==='n'){if(l.n.length>0)l.n=l.n.slice(0,-1);}else{if(l.e.length>0)l.e=l.e.slice(0,-1);}}
    else if(c==='CLRNOTE'){l.n='';}
    else if(c==='DEL'){if(ls.length>1){ls.splice(ai,1);if(ai>=ls.length)ai=ls.length-1;}else ls[0]={e:'',n:''};mode='e';}
    else if(c==='ENTER'){if(ai===ls.length-1)ls.push({e:'',n:''});ai++;eL();mode='n';}
    else if(c==='DONE'){mode='e';ST('n');return;}
    else if(c===' '){if(mode==='n')l.n+=' ';else l.e+=' ';}
    else{const ch=caps?c.toUpperCase():c;if(mode==='n')l.n+=ch;else l.e+=ch;}
    rN();
  });
});

function ST(t){
  document.getElementById('KN').style.display=t==='n'?'flex':'none';
  document.getElementById('KA').style.display=t==='a'?'flex':'none';
  document.getElementById('S1').className='st'+(t==='n'?' on':'');
  document.getElementById('S2').className='st'+(t==='a'?' on':'');
  if(t==='a'&&mode==='e')mode='n';if(t==='n')mode='e';rN();
}
function SP(p){
  document.getElementById('PC').style.display=p==='c'?'flex':'none';
  document.getElementById('PT').style.display=p==='t'?'flex':'none';
  document.querySelectorAll('.tab').forEach((t,i)=>{t.className='tab'+(['c','t'][i]===p?' on':'');});
  if(p==='t'){rStat();rSav();}
}
function cF(){document.getElementById('FD').value='';document.getElementById('FS').value='';rSav();}
function rSav(){
  const w=document.getElementById('SLW');
  const dari=document.getElementById('FD').value,sam=document.getElementById('FS').value;
  let data=sd;
  if(dari){const d=new Date(dari);data=data.filter(s=>tD0(s.rd)>=d);}
  if(sam){const d=new Date(sam);d.setHours(23,59,59);data=data.filter(s=>new Date(s.rd)<=d);}
  if(data.length===0){w.innerHTML='<div class="EM">'+(sd.length===0?'Belum ada riwayat.<br>Tekan Save untuk menyimpan.':'Tidak ada data untuk filter ini.')+'</div>';return;}
  w.innerHTML=data.map(s=>`<div class="RI"><div class="RH"><span class="RD">${eh(s.date)}</span><button class="RB" onclick="dS(${s.id})">Hapus</button></div><div class="RL">${s.ls.map(l=>`${eh(l.e)}${l.n?' <span style="color:#4285f4">('+eh(l.n)+')</span>':''} = <b>${fN(l.r)}</b>`).join('<br>')}</div><div class="RF"><span style="color:#3a6e4a;font-weight:700">Total: ${fN(s.tot)}</span>${s.bay?`<span style="color:#666">Bayar: ${fN(s.bay)}</span><span style="color:${s.kem>=0?'#2d9e4a':'#e44'};font-weight:700"> Kembali: ${fN(s.kem)}</span>`:''}</div></div>`).join('');
}
function dS(id){if(!confirm('Hapus data ini?'))return;sd=sd.filter(s=>s.id!==id);saveSd();rSav();rStat();}
function sP(d){return d.reduce((a,s)=>a+s.tot,0);}
function fDay(d,off){const t=new Date();t.setDate(t.getDate()+off);const ds=t.toDateString();return d.filter(s=>new Date(s.rd).toDateString()===ds);}
function fDays(d,n){const t=new Date();t.setDate(t.getDate()-n);return d.filter(s=>new Date(s.rd)>=t);}
function rStat(){
  const top=[{l:'Hari Ini',v:sP(fDay(sd,0))},{l:'Kemarin',v:sP(fDay(sd,-1))},{l:'7 Hari',v:sP(fDays(sd,7))}];
  const bot=[{l:'30 Hari',v:sP(fDays(sd,30))},{l:'Total Semua',v:sP(sd)},{l:'Sesi',v:sd.length},{l:'Sesi Hari Ini',v:fDay(sd,0).length}];
  document.getElementById('SBL_top').innerHTML=top.map(b=>`<div class="SGI"><div class="SGL">${eh(b.l)}</div><div class="SGV">${fN(b.v)}</div></div>`).join('');
  document.getElementById('SBL_bot').innerHTML=bot.map(b=>`<div class="SGI2"><span class="SGL2">${eh(b.l)}</span><span class="SGV2">${fN(b.v)}</span></div>`).join('');
}
function dl(){
  const now=new Date();
  let txt='LAPORAN CALCNOTE\nDiekspor: '+now.toLocaleString('id-ID')+'\n'+'='.repeat(40)+'\n\n';
  txt+=`Hari Ini    : ${fN(sP(fDay(sd,0)))}\nKemarin     : ${fN(sP(fDay(sd,-1)))}\n7 Hari      : ${fN(sP(fDays(sd,7)))}\n30 Hari     : ${fN(sP(fDays(sd,30)))}\nTotal Semua : ${fN(sP(sd))}\nSesi        : ${sd.length}\n\n`+'-'.repeat(40)+'\nDETAIL SESI:\n\n';
  sd.forEach((s,i)=>{txt+=`[${i+1}] ${s.date}\n`;s.ls.forEach(l=>{txt+=`  ${l.e}${l.n?' ('+l.n+')':''} = ${fN(l.r)}\n`;});txt+=`  Total: ${fN(s.tot)}${s.bay?' | Bayar: '+fN(s.bay)+' | Kembali: '+fN(s.kem):''}\n\n`;});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));a.download='calcnote-'+now.toISOString().slice(0,10)+'.txt';a.click();
}
rN();
</script>
